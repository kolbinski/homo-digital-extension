<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Homo Digital - Profile Review</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    iframe { display: block; width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <iframe id="frame" sandbox="allow-same-origin allow-scripts"></iframe>
  <script>
    chrome.storage.local.get('hd_profile_review', function(result) {
      document.getElementById('frame').srcdoc = result.hd_profile_review || '';
    });
  </script>
</body>
</html>
